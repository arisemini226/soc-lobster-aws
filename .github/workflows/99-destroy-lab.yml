name: Destroy Lab Environment

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY-soc-lobster-aws to confirm'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Init Terraform
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TERRAFORM_STATE_KEY }}"

      - name: Destroy
        run: terraform destroy -auto-approve
        continue-on-error: true

      - name: Upload Terraform state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-failure
          path: terraform.tfstate
          retention-days: 1
